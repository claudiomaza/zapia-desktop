<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cm2labs Instance Manager</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #38bdf8;
            --text: #f8fafc;
            --accent: #0ea5e9;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }
        header {
            padding: 3rem 1rem;
            text-align: center;
        }
        h1 { margin: 0; font-size: 2.5rem; letter-spacing: -1px; }
        .version { font-size: 0.8rem; color: var(--primary); opacity: 0.8; }

        .container {
            width: 90%;
            max-width: 900px;
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .instance-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            background: rgba(255,255,255,0.05);
            border-color: var(--primary);
        }

        .card h3 { margin: 0 0 1rem 0; font-size: 1.2rem; }

        .btn {
            background: var(--primary);
            color: var(--bg);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn.outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
    </style>
</head>
<body>
    <header>
        <h1>cm2labs</h1>
        <div class="version">Instance Launcher v1.1.0</div>
    </header>

    <div class="container">
        <div class="controls">
            <h2>Mis Instancias</h2>
            <button class="btn" onclick="addInstance()">+ Nueva Cuenta</button>
        </div>

        <div class="instance-grid" id="grid">
            <!-- Cargando instancias... -->
        </div>
    </div>

    <script>
        const { invoke } = window.__TAURI__.core;

        async function loadInstances() {
            try {
                const instances = await invoke('get_instances');
                const grid = document.getElementById('grid');
                grid.innerHTML = instances.map(name => `
                    <div class="card">
                        <h3>${name}</h3>
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn" onclick="launch('${name}')">Lanzar</button>
                            <button class="btn outline" onclick="exportInst('${name}')">Export</button>
                        </div>
                    </div>
                `).join('') || '<p style="opacity: 0.5">No hay instancias creadas aún.</p>';
            } catch (e) {
                console.error(e);
            }
        }

        async function launch(name) {
            // En este caso, para Zapia, la URL es fija
            await invoke('launch_instance', { 
                label: name, 
                url: 'https://app.zapia.com', 
                isLocal: false 
            });
        }

        async function addInstance() {
            const name = prompt("Nombre de la nueva instancia:");
            if (name) {
                // Simplemente lanzamos para que se cree la carpeta
                await launch(name);
                loadInstances();
            }
        }

        // Carga inicial
        loadInstances();
    </script>
</body>
</html>
